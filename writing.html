      <li><a href="writing.html" class="active"><i class="bi bi-pencil"></i> Writing</a></li>

    <ul class="sidebar-social">

    <div class="sidebar-footer">

  <!-- ======== MAIN CONTENT ======== -->
  <main class="main-content">

    <h1 class="section-title" style="font-size: 2.4rem; margin-bottom: 0.3rem;">Writing</h1>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">
      所有文章，按時間排序。可以用標籤過濾感興趣的主題。
    </p>

    <!-- Tag Filters -->
    <div class="tags-container" id="tag-filters">
      <!-- Rendered by JS -->
    </div>

    <!-- Post List -->

      <!-- Rendered by JS -->
    </div>

    <!-- Footer -->

      Built with <i class="bi bi-code-slash" style="opacity: 0.4;"></i> & <i class="bi bi-journal-text" style="opacity: 0.4;"></i> by Dyson &middot; Hosted on GitHub Pages
    </footer>

  </main>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top">
    <i class="bi bi-chevron-up"></i>
  </button>

  <!-- Scripts -->
  <script src="js/posts-index.js"></script>
  <script>
    // Scroll to top button logic
    (function() {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
      btn.addEventListener('click', () => {
        const startY = window.pageYOffset;
        const duration = Math.min(800, Math.max(300, startY * 0.5));
        let start = null;
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          const ease = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;
          window.scrollTo(0, startY * (1 - ease));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    })();

    document.addEventListener('DOMContentLoaded', async () => {
      await loadPosts();

      // Render all posts
      renderPosts('posts-list', POSTS);

      // Render tag filter buttons
      renderTagFilters('tag-filters', (tag) => {
        const filtered = filterPostsByTag(tag);
        renderPosts('posts-list', filtered);
      });
    });

    // Sidebar toggle for mobile
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('show');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }
  </script>
</body>
