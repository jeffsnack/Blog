  <link href="css/style.css" rel="stylesheet">

</head>

    <!-- Navigation -->

      <li><a href="writing.html"><i class="bi bi-pencil"></i> Writing</a></li>

    <!-- Social Links -->
    <div class="sidebar-section-title">SOCIAL</div>
    <ul class="sidebar-social">
      <li>
        <a href="https://github.com/jeffsnack" target="_blank" rel="noopener">

      </li>

      </li>

        <a href="https://www.instagram.com/jjason900220/" target="_blank" rel="noopener">

      </li>
    </ul>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div style="font-size: 0.75rem; color: var(--text-muted);">
        &copy; 2026 Dyson
      </div>
    </div>
  </aside>

  <!-- ======== MAIN CONTENT ======== -->
  <main class="main-content">

    <!-- Alive Badge -->
    <div style="display: flex; justify-content: flex-end; margin-bottom: 1.5rem;">
      <span class="alive-badge">
        <span class="alive-dot"></span> Alive
      </span>
    </div>

    <!-- Hero Section -->
    <section style="margin-bottom: 3rem;">
      <h1 class="hero-title">Dyson</h1>
      <p class="hero-subtitle">
        AI Engineer, Dev, Yorushika Fan
      </p>
    </section>

    <hr class="section-divider">

    <!-- Latest Writings -->
    <section>
      <h2 class="section-title">Recent Writings</h2>
      <div id="latest-posts">
        <!-- Rendered by JS -->
      </div>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="writing.html" style="font-size: 0.92rem; display: inline-flex; align-items: center; gap: 0.3rem;">
          查看全部文章 <i class="bi bi-arrow-right-short"></i>
        </a>
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
      Built with <i class="bi bi-code-slash" style="opacity: 0.4;"></i> & <i class="bi bi-journal-text" style="opacity: 0.4;"></i> by Dyson &middot; Hosted on GitHub Pages
    </footer>

  </main>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top">
    <i class="bi bi-chevron-up"></i>
  </button>

  <!-- Scripts -->
  <script src="js/posts-index.js"></script>
  <script>
    // Scroll to top button logic
    (function() {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
      btn.addEventListener('click', () => {
        const startY = window.pageYOffset;
        const duration = Math.min(800, Math.max(300, startY * 0.5));
        let start = null;
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          const ease = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;
          window.scrollTo(0, startY * (1 - ease));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    })();

    // Render latest 5 posts on homepage
    document.addEventListener('DOMContentLoaded', async () => {
      await loadPosts();
      renderPosts('latest-posts', POSTS, 5);
    });

    // Sidebar toggle for mobile
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('show');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }

    // Highlight current nav item
    document.querySelectorAll('.sidebar-nav a').forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('href') === 'index.html') {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
