<!DOCTYPE html>

  <!-- Custom Styles -->

</head>
<body>

  <!-- Sidebar Overlay (mobile) -->

  <!-- ======== SIDEBAR ======== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" style="color: inherit; text-decoration: none;">Dyson</a>
      <button class="theme-toggle" aria-label="Toggle theme">
        <i class="bi bi-moon"></i>
      </button>
    </div>

    <ul class="sidebar-nav">
      <li><a href="index.html"><i class="bi bi-house-door"></i> Home</a></li>
      <li><a href="writing.html"><i class="bi bi-pencil"></i> Writing</a></li>
    </ul>

    <div class="sidebar-section-title">SOCIAL</div>
    <ul class="sidebar-social">
      <li>
        <a href="https://github.com/jeffsnack" target="_blank" rel="noopener">
          <i class="bi bi-github"></i> GitHub
        </a>
      </li>
      <li>
        <a href="https://www.linkedin.com/in/dyson-yang-347634317/" target="_blank" rel="noopener">
          <i class="bi bi-linkedin"></i> LinkedIn
        </a>
      </li>
      <li>
        <a href="https://www.instagram.com/jjason900220/" target="_blank" rel="noopener">
          <i class="bi bi-instagram"></i> Instagram
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div style="font-size: 0.75rem; color: var(--text-muted);">
        &copy; 2026 Dyson
      </div>
    </div>
  </aside>

  <!-- ======== MAIN CONTENT ======== -->
  <main class="main-content">

    <!-- Back Link -->
    <a href="writing.html" class="back-link">
      <i class="bi bi-arrow-left"></i> 返回文章列表
    </a>

    <!-- Post Header -->
    <div class="post-header" id="post-header">
      <!-- Rendered by JS -->
    </div>

    <hr class="section-divider" style="margin-top: 0;">

    <!-- Post Content (Markdown rendered here) -->
    <article class="post-content" id="post-content">
      <div class="loading-spinner"></div>
    </article>

    <!-- Footer -->
    <footer class="site-footer">
      Built with <i class="bi bi-code-slash" style="opacity: 0.4;"></i> & <i class="bi bi-journal-text" style="opacity: 0.4;"></i> by Dyson &middot; Hosted on GitHub Pages
    </footer>

  </main>

  <!-- Article TOC (right side) -->
  <nav class="article-toc" id="article-toc" style="display:none;">
    <ul class="toc-list" id="toc-list"></ul>
  </nav>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top">
    <i class="bi bi-chevron-up"></i>
  </button>

  <!-- marked.js (Markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <!-- Prism.js (Syntax Highlighting) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <!-- Prism auto-loader for extra languages -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <script src="js/posts-index.js"></script>
  <script src="js/post-loader.js"></script>
  <script>
    // Scroll to top button logic
    (function() {
      const btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
      btn.addEventListener('click', () => {
        const startY = window.pageYOffset;
        const duration = Math.min(800, Math.max(300, startY * 0.5));
        let start = null;
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          const ease = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;
          window.scrollTo(0, startY * (1 - ease));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    })();

    document.addEventListener('DOMContentLoaded', async () => {
      // Get slug from URL
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        document.getElementById('post-content').innerHTML = `
          <div class="empty-state">
            <i class="bi bi-question-circle"></i>
            <p>未指定文章。</p>
            <a href="writing.html" class="back-link" style="justify-content: center; margin-top: 1rem;">
              <i class="bi bi-arrow-left"></i> 返回文章列表
            </a>
          </div>
        `;
        return;
      }

      await loadPosts();
      const postData = getPostBySlug(slug);
      loadAndRenderPost(slug, postData);
    });

    // Sidebar toggle for mobile
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('show');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }
  </script>
</body>
</html>
